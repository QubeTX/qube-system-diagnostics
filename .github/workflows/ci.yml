name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            targets: x86_64-unknown-linux-gnu x86_64-unknown-linux-musl aarch64-unknown-linux-gnu
          - os: macos-15
            targets: aarch64-apple-darwin x86_64-apple-darwin
          - os: windows-2025
            targets: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust 1.95
        shell: bash
        run: |
          rustup toolchain install 1.95 --profile minimal --component rustfmt,clippy
          rustup default 1.95
          rustup target add ${{ matrix.targets }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Release build
        run: cargo build --release --locked

      - name: Target checks
        shell: bash
        run: |
          for target in ${{ matrix.targets }}; do
            cargo check --locked --target "$target"
          done

  dist-plan:
    name: cargo-dist plan
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust 1.95
        run: |
          rustup toolchain install 1.95 --profile minimal
          rustup default 1.95

      - name: Install cargo-dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh

      - name: Dist plan
        run: dist plan

  audit:
    name: Security audit
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust 1.95
        run: |
          rustup toolchain install 1.95 --profile minimal
          rustup default 1.95

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Audit dependencies
        run: cargo audit
