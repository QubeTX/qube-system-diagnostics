#
# Copyright 2022-2024, axodotdev
# SPDX-License-Identifier: MIT or Apache-2.0
#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.

name: Release
permissions:
  "contents": "write"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source-check:
    runs-on: "ubuntu-22.04"
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      tag_flag: ${{ steps.meta.outputs.tag_flag }}
      publishing: ${{ steps.meta.outputs.publishing }}
      should_deploy: ${{ steps.meta.outputs.should_deploy }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - id: meta
        name: Resolve release metadata
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          package_name=$(awk -F ' *= *' '
            $0 == "[package]" { in_package=1; next }
            /^\[/ && in_package { exit }
            in_package && $1 == "name" { gsub(/"/, "", $2); print $2; exit }
          ' Cargo.toml)
          version=$(awk -F ' *= *' '
            $0 == "[package]" { in_package=1; next }
            /^\[/ && in_package { exit }
            in_package && $1 == "version" { gsub(/"/, "", $2); print $2; exit }
          ' Cargo.toml)

          if [ -z "$package_name" ] || [ -z "$version" ]; then
            echo "::error::Could not resolve package name/version from Cargo.toml"
            exit 1
          fi

          publishing=false
          should_deploy=false
          tag=""
          tag_flag=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            :
          elif [ "$REF_TYPE" = "tag" ]; then
            expected_tag="v${version}"
            if [ "$REF_NAME" != "$expected_tag" ]; then
              echo "::error::Explicit releases must use canonical tag ${expected_tag}; received ${REF_NAME}."
              exit 1
            fi
            publishing=true
            should_deploy=true
            tag="$REF_NAME"
            tag_flag="--tag=$tag"
          else
            tag="v$version"
            tag_flag="--tag=$tag"

            crate_status=$(curl -sS -H "User-Agent: sd300-release-workflow (github.com/QubeTX/qube-system-diagnostics)" -o /tmp/crate-version.json -w "%{http_code}" "https://crates.io/api/v1/crates/${package_name}/${version}")
            case "$crate_status" in
              200) crate_exists=true ;;
              404) crate_exists=false ;;
              *)
                echo "::error::Unexpected crates.io status ${crate_status} while checking ${package_name} ${version}"
                cat /tmp/crate-version.json
                exit 1
                ;;
            esac

            release_exists=false
            release_is_draft=false
            if gh release view "$tag" >/dev/null 2>&1; then
              release_exists=true
              release_is_draft=$(gh release view "$tag" --json isDraft --jq .isDraft)
            fi

            tag_exists=false
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              tag_exists=true
              git fetch --force --depth=1 origin "refs/tags/${tag}:refs/tags/${tag}"
              tag_sha=$(git rev-list -n 1 "refs/tags/${tag}")
              source_sha=$(git rev-parse HEAD)
              if [ "$tag_sha" != "$source_sha" ]; then
                echo "::error::Immutable tag ${tag} resolves to ${tag_sha}, but this release source is ${source_sha}."
                exit 1
              fi
            fi

            if [ "$release_is_draft" = true ]; then
              echo "::error::Qualification draft ${tag} already exists. Finish or delete that exact draft before changing ${version} source state."
              exit 1
            elif [ "$crate_exists" = true ] && [ "$release_exists" = true ]; then
              echo "Crate ${package_name} ${version} and GitHub release ${tag} already exist; this main push will verify but skip deploy."
            elif [ "$crate_exists" = true ] && [ "$release_exists" = false ]; then
              echo "Crate ${package_name} ${version} exists but GitHub release ${tag} is missing; will rebuild artifacts and finish hosting."
              publishing=true
              should_deploy=true
            elif [ "$release_exists" = true ]; then
              echo "::error::Partial release state for ${tag}: crate_exists=${crate_exists}, release_exists=${release_exists}, tag_exists=${tag_exists}. Bump the patch version or repair the partial release manually."
              exit 1
            else
              publishing=true
              should_deploy=true
            fi
          fi

          {
            echo "package_name=$package_name"
            echo "version=$version"
            echo "tag=$tag"
            echo "tag_flag=$tag_flag"
            echo "publishing=$publishing"
            echo "should_deploy=$should_deploy"
          } >> "$GITHUB_OUTPUT"
      - name: Verify coordinated product version
        run: node scripts/check-product-version-consistency.mjs --expected-target '${{ steps.meta.outputs.version }}'
      - name: Verify clean-cache and warmed-offline Native SDK dependency graph
        shell: bash
        run: |
          set -euo pipefail
          cache="$RUNNER_TEMP/sd300-native-npm-cache"
          rm -rf gui/node_modules "$cache"
          npm --prefix gui ci --ignore-scripts --cache "$cache"
          node scripts/prepare-native-sdk.mjs gui
          node scripts/check-native-distribution.mjs gui
          rm -rf gui/node_modules
          npm --prefix gui ci --ignore-scripts --offline --cache "$cache"
          node scripts/prepare-native-sdk.mjs gui
          node scripts/check-native-distribution.mjs gui
      - name: Check formatting
        run: cargo fmt --check
      - name: Run tests
        run: cargo test --locked
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Verify crates.io package
        run: cargo publish --dry-run --locked

  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    needs:
      - source-check
    if: ${{ github.event_name == 'pull_request' || needs.source-check.outputs.should_deploy == 'true' }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ needs.source-check.outputs.tag }}
      tag-flag: ${{ needs.source-check.outputs.tag_flag }}
      publishing: ${{ needs.source-check.outputs.publishing }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v6
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        shell: bash
        run: |
          if [ "${{ needs.source-check.outputs.publishing }}" = "true" ]; then
            dist host --steps=create "${{ needs.source-check.outputs.tag_flag }}" --output-format=json > plan-dist-manifest.json
          else
            dist plan --output-format=json > plan-dist-manifest.json
          fi
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          {
            echo "paths<<EOF"
            dist print-upload-files-from-manifest --manifest dist-manifest.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          {
            echo "paths<<EOF"
            jq --raw-output ".upload_files[]" dist-manifest.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    # Only assemble the draft after every cargo-dist build succeeds. Registry
    # publication remains gated on the downstream native qualification matrix.
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Remove the granular manifests
          rm -f artifacts/*-dist-manifest.json
      - name: Assemble stable managed and compatibility installers
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          version=${RELEASE_TAG#v}
          test -f artifacts/tr300-tui-installer.sh
          test -f artifacts/tr300-tui-installer.ps1

          mv artifacts/tr300-tui-installer.sh artifacts/sd300-dist-installer.sh
          mv artifacts/tr300-tui-installer.ps1 artifacts/sd300-dist-installer.ps1
          rm -f artifacts/tr300-tui-installer.sh.sha256 artifacts/tr300-tui-installer.ps1.sha256

          # shellcheck disable=SC2016
          sed -i \
            -e 's/^APP_NAME="tr300-tui"$/APP_NAME="sd300"/' \
            -e 's#RECEIPT_HOME="$LOCALAPPDATA/tr300-tui"#RECEIPT_HOME="$LOCALAPPDATA/sd300"#' \
            -e 's#RECEIPT_HOME="${XDG_CONFIG_HOME:-$INFERRED_HOME/.config}/tr300-tui"#RECEIPT_HOME="${XDG_CONFIG_HOME:-$INFERRED_HOME/.config}/sd300"#' \
            -e 's/"app_name":"tr300-tui"/"app_name":"sd300"/' \
            artifacts/sd300-dist-installer.sh
          # shellcheck disable=SC2016
          sed -i \
            -e "s/^[\$]app_name = 'tr300-tui'$/\$app_name = 'sd300'/" \
            -e 's#${env:XDG_CONFIG_HOME}\\tr300-tui#${env:XDG_CONFIG_HOME}\\sd300#' \
            -e 's#${env:LOCALAPPDATA}\\tr300-tui#${env:LOCALAPPDATA}\\sd300#' \
            -e 's/"app_name":"tr300-tui"/"app_name":"sd300"/' \
            -e 's#"$receipt_home/tr300-tui-receipt.json"#"$receipt_home/sd300-receipt.json"#' \
            artifacts/sd300-dist-installer.ps1

          grep -Fq 'APP_NAME="sd300"' artifacts/sd300-dist-installer.sh
          grep -Fq 'LOCALAPPDATA/sd300' artifacts/sd300-dist-installer.sh
          grep -Fq '/sd300"' artifacts/sd300-dist-installer.sh
          grep -Fq '"app_name":"sd300"' artifacts/sd300-dist-installer.sh
          grep -Fq "app_name = 'sd300'" artifacts/sd300-dist-installer.ps1
          grep -Fq 'XDG_CONFIG_HOME}\sd300' artifacts/sd300-dist-installer.ps1
          grep -Fq 'LOCALAPPDATA}\sd300' artifacts/sd300-dist-installer.ps1
          grep -Fq '"app_name":"sd300"' artifacts/sd300-dist-installer.ps1
          grep -Fq 'receipt_home/sd300-receipt.json' artifacts/sd300-dist-installer.ps1

          render() {
            sed \
              -e "s/@SD300_TAG@/${RELEASE_TAG}/g" \
              -e "s/@SD300_VERSION@/${version}/g" \
              "$1" > "$2"
          }
          render scripts/managed-installers/sd300-installer.sh artifacts/sd300-cli-installer.sh
          render scripts/managed-installers/sd300-installer.ps1 artifacts/sd300-cli-installer.ps1
          render scripts/compat-installers/tr300-tui-installer.sh artifacts/tr300-tui-installer.sh
          render scripts/compat-installers/tr300-tui-installer.ps1 artifacts/tr300-tui-installer.ps1
          cp artifacts/tr300-tui-installer.sh artifacts/SD300-installer.sh
          cp artifacts/tr300-tui-installer.ps1 artifacts/SD300-installer.ps1
          chmod 755 artifacts/sd300-cli-installer.sh artifacts/tr300-tui-installer.sh artifacts/SD300-installer.sh

          # Only the build-time placeholders must be gone; the managed wrapper
          # legitimately carries @SD300_RUNTIME@/@SD300_GUI@ inside its own
          # runtime-side sed commands, rendered on the user's machine.
          if grep -R -E '@SD300_(TAG|VERSION)@' \
            artifacts/sd300-cli-installer.* artifacts/tr300-tui-installer.* artifacts/SD300-installer.*; then
            echo 'installer placeholder was not rendered' >&2
            exit 1
          fi
          grep -Fq "sd300_tag='${RELEASE_TAG}'" artifacts/sd300-cli-installer.sh
          grep -Fq "releases/download/\${sd300_tag}" artifacts/sd300-cli-installer.sh
          grep -Fq "sd300_stage_release_asset 'sd300-dist-installer.sh'" artifacts/sd300-cli-installer.sh
          grep -Fq "\$Sd300Tag = '${RELEASE_TAG}'" artifacts/sd300-cli-installer.ps1
          grep -Fq "releases/download/\$Sd300Tag" artifacts/sd300-cli-installer.ps1
          grep -Fq "Get-Sd300ReleaseFile 'sd300-dist-installer.ps1'" artifacts/sd300-cli-installer.ps1
          grep -Fq "sd300-macos-universal.pkg" artifacts/tr300-tui-installer.sh
          grep -Fq "sd300-windows-x64-" artifacts/tr300-tui-installer.ps1

          for asset in \
            sd300-dist-installer.sh sd300-dist-installer.ps1 \
            sd300-cli-installer.sh sd300-cli-installer.ps1 \
            tr300-tui-installer.sh tr300-tui-installer.ps1 \
            SD300-installer.sh SD300-installer.ps1; do
            (cd artifacts && sha256sum "$asset" > "$asset.sha256")
          done
      - name: Create qualified-release draft
        env:
          PRERELEASE_FLAG: "${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(steps.host.outputs.manifest).announcement_title }}"
          ANNOUNCEMENT_BODY: "${{ fromJson(steps.host.outputs.manifest).announcement_github_body }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          # Public instructions stay on the versionless latest endpoint. The
          # draft remains invisible until native Windows/macOS artifacts and
          # their installation tests pass in the downstream qualification jobs.
          printf '%s\n' "$ANNOUNCEMENT_BODY" \
            | sed \
                -e "s|/releases/download/${{ needs.plan.outputs.tag }}/|/releases/latest/download/|g" \
                -e 's/^## Install .* [^[:space:]]*$/## Install SD-300 (latest)/' \
                -e 's/^## Download .* [^[:space:]]*$/## Download SD-300 (latest)/' \
            > "$RUNNER_TEMP/notes.txt"

          prerelease_args=()
          if [[ -n $PRERELEASE_FLAG ]]; then
            prerelease_args+=("$PRERELEASE_FLAG")
          fi
          gh release create "${{ needs.plan.outputs.tag }}" --draft --target "$RELEASE_COMMIT" "${prerelease_args[@]}" --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*

  announce:
    needs:
      - plan
      - host
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
