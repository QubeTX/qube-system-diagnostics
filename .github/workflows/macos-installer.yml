name: macOS Universal Package

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Draft release tag to qualify"
        required: true
        type: string
      preflight_only:
        description: "Only prove the Installer identity on both Mac families"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: sd300-macos-native-${{ github.event.workflow_run.head_sha || inputs.tag }}
  cancel-in-progress: false

jobs:
  draft-check:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-22.04
    outputs:
      ready: ${{ steps.meta.outputs.ready }}
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      source_sha: ${{ steps.meta.outputs.source_sha }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false
      - id: meta
        name: Resolve qualification draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
          PREFLIGHT_ONLY: ${{ inputs.preflight_only }}
          EXPECTED_SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          TRIGGER_SOURCE_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
        shell: bash
        run: |
          set -euo pipefail
          source_sha=$(git rev-parse HEAD)
          [[ $source_sha == "$EXPECTED_SOURCE_SHA" ]] || {
            echo "checkout $source_sha does not match triggering source $EXPECTED_SOURCE_SHA" >&2
            exit 1
          }
          source_ref=${TRIGGER_SOURCE_REF:-$source_sha}
          version=$(awk -F ' *= *' '$0 == "[package]" { p=1; next } /^\[/ && p { exit } p && $1 == "version" { gsub(/"/, "", $2); print $2 }' Cargo.toml)
          if [[ $EVENT_NAME == workflow_dispatch ]]; then
            tag=$DISPATCH_TAG
          else
            tag="v${version}"
          fi
          [[ $tag == "v${version}" ]] || { echo "tag $tag does not match Cargo.toml $version" >&2; exit 1; }
          release_json=$(gh release view "$tag" --json isDraft,tagName,targetCommitish 2>/dev/null || true)
          state=$(jq -r '.isDraft // empty' <<< "$release_json")
          if [[ $EVENT_NAME == workflow_dispatch && $PREFLIGHT_ONLY == true ]]; then
            ready=true
            echo "Running the requested credential-only preflight for $tag."
          elif [[ $state == true ]]; then
            ready=true
            release_tag=$(jq -r '.tagName // empty' <<< "$release_json")
            target_commitish=$(jq -r '.targetCommitish // empty' <<< "$release_json")
            [[ $release_tag == "$tag" ]] || { echo "release tag $release_tag does not match requested tag $tag" >&2; exit 1; }
            [[ $target_commitish == "$source_sha" ]] || {
              echo "release $tag targets $target_commitish, but this producer checkout is $source_sha" >&2
              exit 1
            }
            git fetch --force --depth=1 origin "refs/tags/$tag:refs/tags/$tag"
            tag_sha=$(git rev-list -n 1 "refs/tags/$tag")
            [[ $tag_sha == "$source_sha" ]] || {
              echo "tag $tag resolves to $tag_sha, but this producer checkout is $source_sha" >&2
              exit 1
            }
          elif [[ $EVENT_NAME == workflow_dispatch ]]; then
            echo "$tag is not an unpublished qualification draft" >&2
            exit 1
          else
            ready=false
            echo "$tag is already public or unavailable; skipping native macOS qualification."
          fi
          {
            echo "ready=$ready"
            echo "tag=$tag"
            echo "version=$version"
            echo "source_sha=$source_sha"
            echo "source_ref=$source_ref"
          } >> "$GITHUB_OUTPUT"
          {
            echo '### macOS producer source identity'
            echo
            echo "- Source ref: \`$source_ref\`"
            echo "- Source SHA: \`$source_sha\`"
            echo "- Release tag: \`$tag\`"
            echo "- Producer enabled: \`$ready\`"
          } >> "$GITHUB_STEP_SUMMARY"

  credential-preflight:
    needs: draft-check
    if: ${{ needs.draft-check.outputs.ready == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            runner: macos-15
          - name: Intel
            runner: macos-15-intel
    name: Installer identity preflight (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.draft-check.outputs.source_sha }}
          persist-credentials: false
      - name: Verify exact source checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = '${{ needs.draft-check.outputs.source_sha }}'
      - name: Import Installer identity and sign disposable PKG
        env:
          APPLE_INSTALLER_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ vars.APPLE_INSTALLER_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        shell: bash
        run: bash scripts/verify-apple-installer-identity.sh

  build-gui-arch:
    needs: draft-check
    if: ${{ needs.draft-check.outputs.ready == 'true' && (github.event_name == 'workflow_run' || inputs.preflight_only == false) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            runner: macos-15
            gui_target: macos-arm64
            engine: libsd300_engine.dylib
          - name: Intel
            runner: macos-15-intel
            gui_target: macos-x86_64
            engine: libsd300_engine.dylib
    name: Build native GUI (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.draft-check.outputs.source_sha }}
          persist-credentials: false
      - name: Verify exact source checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = '${{ needs.draft-check.outputs.source_sha }}'
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: "1.95"
      - name: Verify coordinated product version
        run: node scripts/check-product-version-consistency.mjs --expected-target '${{ needs.draft-check.outputs.version }}'
      - name: Verify clean-cache and warmed-offline Native SDK restore
        shell: bash
        run: |
          set -euo pipefail
          cache="$RUNNER_TEMP/sd300-native-npm-cache"
          rm -rf gui/node_modules "$cache"
          npm --prefix gui ci --ignore-scripts --cache "$cache"
          node scripts/prepare-native-sdk.mjs gui
          node scripts/check-native-distribution.mjs gui
          rm -rf gui/node_modules
          npm --prefix gui ci --ignore-scripts --offline --cache "$cache"
          node scripts/prepare-native-sdk.mjs gui
          node scripts/check-native-distribution.mjs gui
      - name: Build, test, and audit architecture-native GUI
        shell: bash
        env:
          SD300_MAKIRA_FONT_BROTLI_BASE64_PART_1: ${{ secrets.SD300_MAKIRA_FONT_BROTLI_BASE64_PART_1 }}
          SD300_MAKIRA_FONT_BROTLI_BASE64_PART_2: ${{ secrets.SD300_MAKIRA_FONT_BROTLI_BASE64_PART_2 }}
        run: |
          set -euo pipefail
          SD300_SKIP_NPM_CI=1 bash scripts/build-native-gui.sh '${{ matrix.gui_target }}'
          bin="target/native-gui-stage/${{ matrix.gui_target }}/app/zig-out/bin"
          test -x "$bin/sd300-gui"
          test -f "$bin/${{ matrix.engine }}"
          mkdir -p raw
          COPYFILE_DISABLE=1 tar -czf \
            "raw/sd300-gui-${{ matrix.gui_target }}-raw.tar.gz" \
            -C "$bin" sd300-gui '${{ matrix.engine }}' licenses
      - uses: actions/upload-artifact@v6
        with:
          name: sd300-gui-${{ matrix.gui_target }}-${{ needs.draft-check.outputs.tag }}
          if-no-files-found: error
          path: raw/sd300-gui-${{ matrix.gui_target }}-raw.tar.gz

  build:
    needs: [draft-check, credential-preflight, build-gui-arch]
    if: ${{ needs.draft-check.outputs.ready == 'true' && needs.credential-preflight.result == 'success' && needs.build-gui-arch.result == 'success' && (github.event_name == 'workflow_run' || inputs.preflight_only == false) }}
    runs-on: macos-15-intel
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      source_sha: ${{ steps.meta.outputs.source_sha }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.draft-check.outputs.source_sha }}
          persist-credentials: false
      - name: Verify exact source checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = '${{ needs.draft-check.outputs.source_sha }}'
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Verify coordinated product version
        run: node scripts/check-product-version-consistency.mjs --expected-target '${{ needs.draft-check.outputs.version }}'
      - id: meta
        name: Resolve draft metadata
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "tag=${{ needs.draft-check.outputs.tag }}"
            echo "version=${{ needs.draft-check.outputs.version }}"
            echo "source_sha=${{ needs.draft-check.outputs.source_sha }}"
            echo "source_ref=${{ needs.draft-check.outputs.source_ref }}"
          } >> "$GITHUB_OUTPUT"

      - name: Download exact architecture archives from draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir upstream
          gh release download '${{ steps.meta.outputs.tag }}' --dir upstream \
            --pattern 'tr300-tui-aarch64-apple-darwin.tar.xz*' \
            --pattern 'tr300-tui-x86_64-apple-darwin.tar.xz*'
          (cd upstream && shasum -a 256 -c ./*.sha256)

      - uses: actions/download-artifact@v7
        with:
          name: sd300-gui-macos-arm64-${{ steps.meta.outputs.tag }}
          path: gui-arm64
      - uses: actions/download-artifact@v7
        with:
          name: sd300-gui-macos-x86_64-${{ steps.meta.outputs.tag }}
          path: gui-x86_64

      - name: Build, sign, notarize, and staple direct PKG
        timeout-minutes: 45
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ vars.APPLE_INSTALLER_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        shell: bash
        run: |
          bash scripts/build-sign-notarize-macos-installer.sh \
            '${{ steps.meta.outputs.version }}' \
            upstream/tr300-tui-aarch64-apple-darwin.tar.xz \
            upstream/tr300-tui-x86_64-apple-darwin.tar.xz \
            gui-arm64/sd300-gui-macos-arm64-raw.tar.gz \
            gui-x86_64/sd300-gui-macos-x86_64-raw.tar.gz \
            output

      - uses: actions/upload-artifact@v6
        with:
          name: sd300-macos-universal-${{ steps.meta.outputs.tag }}
          if-no-files-found: error
          path: |
            output/sd300-macos-universal.pkg*
            output/sd300-gui-macos-universal.zip*

  validate:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            prior_sha256: 77d6b2b4a20f0b25894315bd38e13f9ff0909c9777be52d1dc57570ab93a8647
          - name: Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            prior_sha256: ec6ee4b9a38cd4bd043f8484e77e6d6b99ebcd63cceded8149723bdf5dc2a887
    name: Install and exercise PKG (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.build.outputs.source_sha }}
          persist-credentials: false
      - name: Verify exact source checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = '${{ needs.build.outputs.source_sha }}'
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: "1.95"
      - name: Build synthetic prior-version updater
        shell: bash
        run: |
          set -euo pipefail
          perl -0pi -e 's/(\[package\].*?\nversion = ")[^"]+/${1}1.9.9/s' Cargo.toml
          perl -0pi -e 's/(name = "tr300-tui"\nversion = ")[^"]+/${1}1.9.9/' Cargo.lock
          cargo build --release --locked --target-dir target/prior-build

      - uses: actions/download-artifact@v7
        with:
          name: sd300-macos-universal-${{ needs.build.outputs.tag }}
          path: artifact
      - name: Download matching managed fixture binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release download '${{ needs.build.outputs.tag }}' \
            --pattern 'tr300-tui-${{ matrix.target }}.tar.xz' \
            --pattern 'tr300-tui-${{ matrix.target }}.tar.xz.sha256' --dir fixture
          (cd fixture && shasum -a 256 -c 'tr300-tui-${{ matrix.target }}.tar.xz.sha256')
          mkdir fixture/extracted
          tar -xJf fixture/tr300-tui-${{ matrix.target }}.tar.xz -C fixture/extracted

      - name: Exercise immutable v2 Cargo completion into exact managed CLI and GUI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SD300_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TR300_TUI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --depth=1 origin refs/tags/v2.0.6:refs/tags/v2.0.6
          prior_commit=$(git rev-list -n 1 refs/tags/v2.0.6)
          test "$prior_commit" = a81d86cbd8c9617f84072d721e94040cc2a05dd2

          assets="$RUNNER_TEMP/sd300-cargo-assets-${{ matrix.target }}"
          prior="$RUNNER_TEMP/sd300-public-v2-${{ matrix.target }}"
          mkdir -p "$assets" "$prior/extracted"
          for name in \
            sd300-cli-installer.sh \
            sd300-cli-installer.sh.sha256 \
            sd300-dist-installer.sh \
            sd300-dist-installer.sh.sha256; do
            gh release download '${{ needs.build.outputs.tag }}' \
              --repo '${{ github.repository }}' --dir "$assets" \
              --pattern "$name" --clobber
          done
          cp 'fixture/tr300-tui-${{ matrix.target }}.tar.xz' \
            'fixture/tr300-tui-${{ matrix.target }}.tar.xz.sha256' "$assets/"
          cp artifact/sd300-gui-macos-universal.zip \
            artifact/sd300-gui-macos-universal.zip.sha256 "$assets/"
          gh release download v2.0.6 --repo '${{ github.repository }}' \
            --dir "$prior" \
            --pattern 'tr300-tui-${{ matrix.target }}.tar.xz' \
            --pattern 'tr300-tui-${{ matrix.target }}.tar.xz.sha256' --clobber
          (cd "$assets" && shasum -a 256 -c ./*.sha256)
          (cd "$prior" && shasum -a 256 -c 'tr300-tui-${{ matrix.target }}.tar.xz.sha256')
          test "$(shasum -a 256 "$prior/tr300-tui-${{ matrix.target }}.tar.xz" | awk '{print $1}')" = \
            '${{ matrix.prior_sha256 }}'

          tar -xJf "$prior/tr300-tui-${{ matrix.target }}.tar.xz" -C "$prior/extracted"
          prior_binary=$(find "$prior/extracted" -type f -name sd300 -perm -111 -print -quit)
          candidate_binary=$(find fixture/extracted -type f -name sd300 -perm -111 -print -quit)
          test -n "$prior_binary" && test -n "$candidate_binary"
          test "$("$prior_binary" --version)" = 'sd300 2.0.6'
          test "$("$candidate_binary" --version)" = 'sd300 ${{ needs.build.outputs.version }}'

          migration_home="$RUNNER_TEMP/sd300-cargo-migration-${{ matrix.target }}"
          export HOME="$migration_home"
          export CARGO_HOME="$migration_home/.cargo"
          export XDG_CONFIG_HOME="$migration_home/.config"
          export XDG_DATA_HOME="$migration_home/.local/share"
          export XDG_CACHE_HOME="$migration_home/.cache"
          export SD300_CI_RELEASE_TAG='${{ needs.build.outputs.tag }}'
          export SD300_CI_RELEASE_ASSET_DIR="$assets"
          mkdir -p "$CARGO_HOME/bin" "$XDG_CONFIG_HOME/sd300"
          cp "$prior_binary" "$CARGO_HOME/bin/sd300"
          chmod 755 "$CARGO_HOME/bin/sd300"
          rustc_metadata=$(rustc -vV)
          jq -n --arg rustc "$rustc_metadata" --arg target '${{ matrix.target }}' '{
            installs: {
              "tr300-tui 2.0.6 (registry+https://github.com/rust-lang/crates.io-index)": {
                version_req: null, bins: ["sd300"], features: [],
                all_features: false, no_default_features: false,
                profile: "release", target: $target, rustc: $rustc
              }
            }
          }' > "$CARGO_HOME/.crates2.json"

          shim="$migration_home/cargo-shim"
          mkdir -p "$shim"
          cat > "$shim/cargo-shim.rs" <<'RUST'
          use std::{env, process::Command};
          fn main() {
              let args: Vec<String> = env::args().skip(1).collect();
              let expected = vec![
                  "install".to_owned(), "tr300-tui".to_owned(),
                  "--version".to_owned(),
                  env::var("SD300_EXPECTED_VERSION").unwrap(),
                  "--force".to_owned(), "--locked".to_owned(),
              ];
              if args != expected {
                  eprintln!("unexpected immutable-v2 cargo command: {:?}", args);
                  std::process::exit(64);
              }
              let status = Command::new("/bin/bash")
                  .arg(env::var("SD300_CARGO_SHIM_HANDLER").unwrap())
                  .status().unwrap();
              std::process::exit(status.code().unwrap_or(1));
          }
          RUST
          cat > "$shim/install-candidate.sh" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          staged="$CARGO_HOME/bin/sd300.next"
          cp "$SD300_CANDIDATE_BINARY" "$staged"
          chmod 755 "$staged"
          mv -f "$staged" "$CARGO_HOME/bin/sd300"
          rustc_metadata=$(rustc -vV)
          jq -n --arg rustc "$rustc_metadata" \
            --arg version "$SD300_EXPECTED_VERSION" \
            --arg target "$SD300_CARGO_TARGET" '{
              installs: {
                ("tr300-tui " + $version + " (registry+https://github.com/rust-lang/crates.io-index)"): {
                  version_req: null, bins: ["sd300"], features: [],
                  all_features: false, no_default_features: false,
                  profile: "release", target: $target, rustc: $rustc
                }
              }
            }' > "$CARGO_HOME/.crates2.json"
          SH
          chmod 700 "$shim/install-candidate.sh"
          rustc "$shim/cargo-shim.rs" -o "$shim/cargo"
          export SD300_CANDIDATE_BINARY="$candidate_binary"
          export SD300_EXPECTED_VERSION='${{ needs.build.outputs.version }}'
          export SD300_CARGO_TARGET='${{ matrix.target }}'
          export SD300_CARGO_SHIM_HANDLER="$shim/install-candidate.sh"
          export PATH="$shim:$PATH"

          first=$("$CARGO_HOME/bin/sd300" update --json)
          test "$(printf '%s\n' "$first" | wc -l | tr -d ' ')" -eq 1
          jq -e --arg version '${{ needs.build.outputs.version }}' '
            .success == true and .action == "update" and
            .install_channel == "cargo" and .target_version == $version
          ' <<< "$first" >/dev/null
          cmp -s "$CARGO_HOME/bin/sd300" "$candidate_binary"

          export PATH=${PATH#"$shim:"}
          second=$("$CARGO_HOME/bin/sd300" update --json)
          test "$(printf '%s\n' "$second" | wc -l | tr -d ' ')" -eq 1
          jq -e --arg version '${{ needs.build.outputs.version }}' '
            .success == true and .action == "update" and
            .install_channel == "cargo" and
            .strategy == "cargo-managed-completion" and
            .target_version == $version
          ' <<< "$second" >/dev/null
          cmp -s "$CARGO_HOME/bin/sd300" "$candidate_binary"
          gui="$HOME/Applications/SD-300.app/Contents/MacOS/sd300-gui"
          engine="$HOME/Applications/SD-300.app/Contents/MacOS/libsd300_engine.dylib"
          receipt="$XDG_CONFIG_HOME/sd300/sd300-receipt.json"
          test -x "$gui" && test -f "$engine" && test -f "$receipt"
          "$gui" --self-test --json | jq -e \
            --arg version '${{ needs.build.outputs.version }}' \
            '.success == true and .product_version == $version and .abi_version == 1' \
            >/dev/null

          third=$("$CARGO_HOME/bin/sd300" update --json)
          test "$(printf '%s\n' "$third" | wc -l | tr -d ' ')" -eq 1
          jq -e '
            .success == true and .install_channel == "shell-installer" and
            .strategy == "current"
          ' <<< "$third" >/dev/null
          rm "$engine"
          repair=$("$CARGO_HOME/bin/sd300" update --json)
          test "$(printf '%s\n' "$repair" | wc -l | tr -d ' ')" -eq 1
          jq -e '
            .success == true and .install_channel == "shell-installer" and
            .strategy == "same-version-repair"
          ' <<< "$repair" >/dev/null
          test -f "$engine"
          uninstall=$("$CARGO_HOME/bin/sd300" uninstall --json)
          test "$(printf '%s\n' "$uninstall" | wc -l | tr -d ' ')" -eq 1
          jq -e '
            .success == true and .action == "uninstall" and
            .install_channel == "shell-installer"
          ' <<< "$uninstall" >/dev/null
          test ! -e "$CARGO_HOME/bin/sd300"
          test ! -e "$HOME/Applications/SD-300.app"
          test ! -e "$XDG_CONFIG_HOME/sd300"

      - name: Validate trust, takeover, diagnostics, update origin, and uninstall
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          pkg="$PWD/artifact/sd300-macos-universal.pkg"
          (cd artifact && shasum -a 256 -c sd300-macos-universal.pkg.sha256)
          (cd artifact && shasum -a 256 -c sd300-gui-macos-universal.zip.sha256)
          signature=$(pkgutil --check-signature "$pkg" 2>&1)
          grep -Fq 'Status: signed by a developer certificate' <<< "$signature"
          grep -Fq '${{ vars.APPLE_INSTALLER_SIGNING_IDENTITY }}' <<< "$signature"
          grep -Fq '(${{ vars.APPLE_TEAM_ID }})' <<< "$signature"
          xcrun stapler validate "$pkg"
          spctl --assess --type install --verbose=4 "$pkg"

          fixture_binary=$(find fixture/extracted -type f -name sd300 -perm -111 -print -quit)
          test -n "$fixture_binary"
          managed_home="$RUNNER_TEMP/sd300-managed-uninstall"
          (
            export HOME="$managed_home"
            export CARGO_HOME="$managed_home/.cargo"
            export XDG_CONFIG_HOME="$managed_home/.config"
            mkdir -p "$CARGO_HOME/bin" "$XDG_CONFIG_HOME/sd300"
            cp "$fixture_binary" "$CARGO_HOME/bin/sd300"
            chmod 755 "$CARGO_HOME/bin/sd300"
            jq -n --arg prefix "$CARGO_HOME" --arg version '${{ needs.build.outputs.version }}' '{
              provider: {source: "cargo-dist"}, source: {app_name: "sd300"},
              install_prefix: $prefix, version: $version
            }' > "$XDG_CONFIG_HOME/sd300/sd300-receipt.json"
            uninstall=$("$CARGO_HOME/bin/sd300" uninstall --json)
            test "$(printf '%s\n' "$uninstall" | wc -l | tr -d ' ')" -eq 1
            jq -e '.success == true and .install_channel == "shell-installer"' <<< "$uninstall"
            test ! -e "$CARGO_HOME/bin/sd300"
            test ! -e "$XDG_CONFIG_HOME/sd300"
          )

          mkdir -p "$HOME/.cargo/bin" "$HOME/.config/sd300"
          cp "$fixture_binary" "$HOME/.cargo/bin/sd300"
          chmod 755 "$HOME/.cargo/bin/sd300"
          jq -n --arg prefix "$HOME/.cargo" --arg version '${{ needs.build.outputs.version }}' '{
            provider: {source: "cargo-dist"}, source: {app_name: "sd300"},
            install_prefix: $prefix, version: $version
          }' > "$HOME/.config/sd300/sd300-receipt.json"

          sudo installer -pkg "$pkg" -target /
          test ! -e "$HOME/.cargo/bin/sd300"
          test ! -e "$HOME/.config/sd300/sd300-receipt.json"
          test "$(/usr/local/bin/sd300 --version)" = 'sd300 ${{ needs.build.outputs.version }}'
          lipo /usr/local/bin/sd300 -verify_arch arm64 x86_64
          app='/Applications/SD-300.app'
          gui="$app/Contents/MacOS/sd300-gui"
          engine="$app/Contents/MacOS/libsd300_engine.dylib"
          test -x "$gui"
          test -f "$engine"
          for notice in PRODUCT-LICENSE.md IBM-PLEX-OFL-1.1.txt NATIVE-SDK-APACHE-2.0.txt; do
            test -s "$app/Contents/Resources/licenses/$notice"
            pkgutil --files com.qubetx.sd300.pkg | grep -Fqx \
              "Applications/SD-300.app/Contents/Resources/licenses/$notice"
          done
          lipo "$gui" -verify_arch arm64 x86_64
          lipo "$engine" -verify_arch arm64 x86_64
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app/Contents/Info.plist")" = 'dev.qubetx.sd300'
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$app/Contents/Info.plist")" = 'SD-300'
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")" = '${{ needs.build.outputs.version }}'
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$app/Contents/Info.plist")" = '${{ needs.build.outputs.version }}'
          codesign --verify --deep --strict --verbose=4 "$app"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=4 "$app"
          self_test=$($gui --self-test --json)
          jq -e --arg version '${{ needs.build.outputs.version }}' '
            .success == true and .product == "SD-300" and
            .product_version == $version and .abi_version == 1
          ' <<< "$self_test"
          pkgutil --pkg-info com.qubetx.sd300.pkg | grep -Fqx 'package-id: com.qubetx.sd300.pkg'
          pkgutil --files com.qubetx.sd300.pkg | grep -Fqx 'usr/local/bin/sd300'
          pkgutil --files com.qubetx.sd300.pkg | grep -Fqx 'Applications/SD-300.app/Contents/MacOS/sd300-gui'
          codesign --verify --strict --verbose=4 /usr/local/bin/sd300

          /usr/local/bin/sd300 gui
          for attempt in {1..30}; do
            pgrep -f '^/Applications/SD-300.app/Contents/MacOS/sd300-gui$' >/dev/null && break
            [[ $attempt -lt 30 ]] || { echo 'installed GUI did not remain running' >&2; exit 1; }
            sleep 1
          done
          first_pid=$(pgrep -f '^/Applications/SD-300.app/Contents/MacOS/sd300-gui$')
          /usr/local/bin/sd300 gui
          sleep 2
          test "$(pgrep -f '^/Applications/SD-300.app/Contents/MacOS/sd300-gui$')" = "$first_pid"

          /usr/local/bin/sd300 snapshot --json > snapshot.json
          jq -e '.target_os == "macos" and (.capabilities | length) >= 10' snapshot.json
          sudo cp target/prior-build/release/sd300 /usr/local/bin/sd300
          sudo chmod 755 /usr/local/bin/sd300
          test "$(/usr/local/bin/sd300 --version)" = 'sd300 1.9.9'
          export SD300_CI_RELEASE_TAG='${{ needs.build.outputs.tag }}'
          export SD300_CI_RELEASE_ASSET_DIR="$PWD/artifact"
          export SD300_CI_NONINTERACTIVE_PKG=1
          update=$(/usr/local/bin/sd300 update --json)
          test "$(printf '%s\n' "$update" | wc -l | tr -d ' ')" -eq 1
          jq -e --arg version '${{ needs.build.outputs.version }}' '
            .success == true and .install_channel == "mac-pkg" and .target_version == $version
          ' <<< "$update"
          test "$(/usr/local/bin/sd300 --version)" = 'sd300 ${{ needs.build.outputs.version }}'
          ! pgrep -f '^/Applications/SD-300.app/Contents/MacOS/sd300-gui$' >/dev/null
          test -x /Applications/SD-300.app/Contents/MacOS/sd300-gui
          lipo /usr/local/bin/sd300 -verify_arch arm64 x86_64
          codesign --verify --strict --verbose=4 /usr/local/bin/sd300

          /usr/local/bin/sd300 gui
          for attempt in {1..30}; do
            pgrep -f '^/Applications/SD-300.app/Contents/MacOS/sd300-gui$' >/dev/null && break
            [[ $attempt -lt 30 ]] || { echo 'updated GUI did not remain running' >&2; exit 1; }
            sleep 1
          done
          uninstall=$(/usr/local/bin/sd300 uninstall --json)
          test "$(printf '%s\n' "$uninstall" | wc -l | tr -d ' ')" -eq 1
          jq -e '.success == true and .install_channel == "mac-pkg"' <<< "$uninstall"
          ! pgrep -f '^/Applications/SD-300.app/Contents/MacOS/sd300-gui$' >/dev/null
          test ! -e /usr/local/bin/sd300
          test ! -e /Applications/SD-300.app
          test ! -e '/Library/Application Support/SD300'
          ! pkgutil --pkg-info com.qubetx.sd300.pkg >/dev/null 2>&1

  attach:
    needs: [build, validate]
    if: ${{ needs.build.result == 'success' && needs.validate.result == 'success' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.build.outputs.source_sha }}
          persist-credentials: false
      - name: Verify exact source checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = '${{ needs.build.outputs.source_sha }}'
      - uses: actions/download-artifact@v7
        with:
          name: sd300-macos-universal-${{ needs.build.outputs.tag }}
          path: artifact
      - name: Attach qualified PKG to draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ needs.build.outputs.tag }}'
          expected='${{ needs.build.outputs.source_sha }}'
          release_json=$(gh release view "$tag" --json isDraft,tagName,targetCommitish)
          test "$(jq -r .isDraft <<< "$release_json")" = true
          test "$(jq -r .tagName <<< "$release_json")" = "$tag"
          test "$(jq -r .targetCommitish <<< "$release_json")" = "$expected"
          git fetch --force --depth=1 origin "refs/tags/$tag:refs/tags/$tag"
          tag_sha=$(git rev-list -n 1 "refs/tags/$tag")
          test "$tag_sha" = "$expected"
          gh release upload '${{ needs.build.outputs.tag }}' \
            artifact/sd300-macos-universal.pkg* \
            artifact/sd300-gui-macos-universal.zip* \
            --repo '${{ github.repository }}' --clobber
